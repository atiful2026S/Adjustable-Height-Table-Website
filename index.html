<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        :root {
            --primary: #2563eb;
            --secondary: #64748b;
            --bg: #f8fafc;
            --text: #1e293b;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            text-align: center;
            width: 90%;
            max-width: 420px;
        }
        input {
            width: 80%;
            padding: 1.2rem;
            font-size: 1.8rem;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            margin: 1rem 0;
            text-align: center;
            font-weight: bold;
        }
        .btn-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 1rem;
        }
        button {
            padding: 0.8rem 1.5rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: transform 0.1s;
        }
        button:active { transform: scale(0.95); }
        .btn-save { background: var(--primary); color: white; }
        .btn-load { background: var(--secondary); color: white; }
        
        .result-box {
            margin-top: 2rem;
            padding: 1.5rem;
            background: #eff6ff;
            border-radius: 15px;
            border: 2px dashed var(--primary);
        }
        .height-value {
            font-size: 3rem;
            font-weight: 800;
            color: var(--primary);
        }
    </style>
</head>
<body>

<div class="container">
    <h2 style="margin-top:0">Table Height Tool</h2>
    <p>Enter your seated elbow height:</p>
    
    <input type="number" id="elbowHeight" placeholder="00" oninput="calculateHeight()">
    
    <div class="btn-group">
        <button class="btn-save" onclick="savePreset()">Save Preset</button>
        <button class="btn-load" onclick="loadPreset()">Load My Height</button>
    </div>
    
    <div class="result-box">
        <p style="margin-top:0; color: var(--secondary);">Set Table To:</p>
        <div class="height-value" id="output">--</div>
    </div>
</div>

<script>
    function calculateHeight() {
        const val = document.getElementById('elbowHeight').value;
        const output = document.getElementById('output');
        
        if (val && val > 0) {
            const result = (parseFloat(val) + 0.5).toFixed(1); 
            output.innerText = result + '"';
        } else {
            output.innerText = '--';
        }
    }

    function savePreset() {
        const val = document.getElementById('elbowHeight').value;
        if (val) {
            localStorage.setItem('userTableHeight', val);
            alert("Height saved! Next time, just click 'Load'.");
        } else {
            alert("Please enter a height first.");
        }
    }

    function loadPreset() {
        const savedVal = localStorage.getItem('userTableHeight');
        if (savedVal) {
            document.getElementById('elbowHeight').value = savedVal;
            calculateHeight();
        } else {
            alert("No saved height found.");
        }
    }
</script>

</body>
</html>
